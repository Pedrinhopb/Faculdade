<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/script.js" defer></script>
</head>
<body>
    
    <h1> Cadastro Produto </h1>

    <form id="form">

        <!-- Descricao Completa -->
        <label for="descricaoCompleta">Descrição Completa:</label>
        <input type="text" id="descricaoCompleta">

        <!-- Embalagem -->
        <label for="embalagem">Embalagem:</label>
        <select name=" embalagem" id="embalagem">
            <option value="">Selecione</option>
            <option value="quilos">Kg</option>
            <option value="unidade">Un</option>
            <option value="caixa">Cx</option>
            <option value="pacote">Pct</option>
        </select>

        <!-- Mercadologico -->
        <label for="mercadologico">Mercadologico:</label>
        <select name=" mercadologico" id="mercadologico">
            <option value="">Selecione</option>
            <option value="cereais">Cereais</option>
            <option value="congelados">Congelados</option>
            <option value="salgados">Salgados</option>
            <option value="perfumaria">Perfumaria</option>
        </select>

        <!-- Comprador -->
         <label for="comprador"> Comprador </label>
         <select name="comprador" id="comprador">
            <option value="">Selecione</option>
            <option value="geral"> Geral </option>
            <option value="regional"> Regional </option>
            <option value="local"> Local</option>
        </select>

        <!-- Código de Barra -->
        <label for="codigoDeBarra">Código de Barra:</label>
        <input type="number" id="codigoDeBarra">

        <!-- Quantidade -->
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade">

        <!-- Validade -->
         <label for="validade">Validade:</label>
        <input type="date" id="validade">

        <!-- Fornecedor -->
         <label for="fornecedor"> Fornecedor </label>
         <input type="text" id="fornecedor">

         <!-- Custo -->
          <label for="custo"> Custo </label>
          <input type="number" id="custo">

        <!-- Preço -->
        <label for="preco"> Preço </label>
        <input type="number" id="preco">

        <button type="submit"> Cadastrar Produto</button>
    </form>
</body>
</html>
