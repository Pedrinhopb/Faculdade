<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro - BrandQRAuth</title>
    <link rel="stylesheet" href="../styles/global.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-container">
            <div class="logo">BrandQRAuth</div>
            <ul class="nav-links">
                <li><a href="../../index.html">Início</a></li>
            </ul>
        </div>
    </nav>

    <div class="container-auth">
        <div class="auth-card">
            <h1>Cadastro</h1>
            
            <form id="cadastroForm">
                <div class="form-group">
                    <label>Tipo de conta:</label>
                    <div class="tipo-conta-options">
                        <label><input type="radio" name="tipoConta" value="usuario" checked> Usuário</label>
                        <label><input type="radio" name="tipoConta" value="empresa"> Empresa</label>
                    </div>
                </div>

                <div class="form-group" id="empresaNomeGroup" style="display: none;">
                    <label for="nomeEmpresa">Nome da Empresa:</label>
                    <input type="text" id="nomeEmpresa" placeholder="Ex: Gucci">
                </div>

                <div class="form-group">
                    <label for="nomeCompleto">Nome Completo:</label>
                    <input type="text" id="nomeCompleto" placeholder="Seu nome completo" required>
                </div>

                <div class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="senha">Senha:</label>
                    <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
                </div>

                <div class="form-group">
                    <label for="confirmaSenha">Confirmar Senha:</label>
                    <input type="password" id="confirmaSenha" placeholder="Confirme a senha" required>
                </div>

                <div class="form-group">
                    <label for="dataNascimento">Data de Nascimento:</label>
                    <input type="date" id="dataNascimento" required>
                </div>

                <div class="form-group">
                    <label for="cpfCnpj">CPF/CNPJ:</label>
                    <input type="text" id="cpfCnpj" placeholder="000.000.000-00" required>
                </div>

                <button type="submit" class="btn btn-primary btn-full">Cadastrar</button>
            </form>

            <div class="auth-links">
                <p>Já tem conta? <a href="login.html">Faça login</a></p>
            </div>

            <div id="mensagem" class="mensagem"></div>
        </div>
    </div>

    <script src="../scripts/storage.js"></script>
    <script src="../scripts/cadastro.js"></script>
</body>
</html>
